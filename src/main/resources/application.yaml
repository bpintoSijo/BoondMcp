server:
  port: 8080

spring:
  application:
    name: boond-mcp
  ai:
    mcp:
      server:
        name: boond-mcp
        version: 0.0.1
        type: SYNC

mcp:
  python:
    base-url: http://localhost:8000
    timeout: 5s

logging:
  pattern:
    level: "%5p [%X{correlationId:-}]"
  level:
    com.sijo.boondmcp: INFO