server:
  port: 8080

spring:
  application:
    name: boond-mcp
  ai:
    mcp:
      server:
        name: smart-search-boond-mcp
        version: @project.version@
        type: SYNC
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp

mcp:
  python:
    base-url: http://localhost:8000
    timeout: 5s

logging:
  pattern:
    level: "%5p [%X{correlationId:-}]"
  level:
    com.sijo.boondmcp: INFO